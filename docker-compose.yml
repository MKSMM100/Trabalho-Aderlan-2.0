version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: financas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: financas_user
      POSTGRES_PASSWORD: financas_pass
      POSTGRES_DB: financas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas_user -d financas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: financas_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: financas_user
      DB_PASSWORD: financas_pass
      DB_NAME: financas_db
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: financas_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
